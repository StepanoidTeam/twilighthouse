<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TWILIGHTHOUSE</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"
      defer
    ></script>
    <script type="module" src="js/app.js" defer></script>
  </head>
  <body>
    <div id="$bootLoader" class="boot-loader">
      <div class="boot-loader-panel flex-col blur-bg">
        <h1 id="$bootLoaderTitle" class="boot-loader-title">TWILIGHTHOUSE</h1>
        <p id="$bootLoaderText" class="boot-loader-text">Loading…</p>
        <p id="$bootLoaderAsset" class="boot-loader-asset">Texture - ...</p>
        <div class="boot-loader-bar" aria-hidden="true">
          <div id="$bootLoaderBarFill" class="boot-loader-bar-fill"></div>
          <p id="$bootLoaderPercent" class="boot-loader-percent">0%</p>
        </div>
      </div>
    </div>

    <div id="$gameContainer" hidden>
      <!-- ===== In-game Escape button ===== -->
      <button
        type="button"
        id="$btnEsc"
        class="esc-btn"
        aria-label="Exit to menu"
      >
        <span class="esc-btn-label">Esc</span>
      </button>

      <!-- ===== In-game volume controls ===== -->
      <div id="$volControls" class="vol-controls">
        <div class="vol-row">
          <button type="button" class="vol-btn" data-target="sfx" data-dir="-1">
            ◀
          </button>
          <span class="vol-icon">🔊</span>
          <span class="vol-val" id="$volSfxVal">50%</span>
          <button type="button" class="vol-btn" data-target="sfx" data-dir="1">
            ▶
          </button>
        </div>
        <div class="vol-row">
          <button
            type="button"
            class="vol-btn"
            data-target="music"
            data-dir="-1"
          >
            ◀
          </button>
          <span class="vol-icon">🎵</span>
          <span class="vol-val" id="$volMusicVal">50%</span>
          <button
            type="button"
            class="vol-btn"
            data-target="music"
            data-dir="1"
          >
            ▶
          </button>
        </div>
      </div>

      <!-- ===== In-game turn buttons ===== -->
      <button
        type="button"
        id="$btnLeft"
        class="turn-btn turn-btn--left"
        aria-label="Turn left"
      >
        <span class="turn-btn-arrow">←</span>
        <span class="turn-btn-key">A</span>
      </button>
      <button
        type="button"
        id="$btnRight"
        class="turn-btn turn-btn--right"
        aria-label="Turn right"
      >
        <span class="turn-btn-arrow">→</span>
        <span class="turn-btn-key">D</span>
      </button>
    </div>

    <!-- ===== Game over / Win screen ===== -->
    <div id="$screenGameOver" class="screen-result" hidden>
      <div class="screen-result-splash" id="$resultSplash"></div>
      <div class="screen-result-content">
        <p class="screen-result-msg" id="$resultMsg"></p>
        <div class="screen-result-actions">
          <button
            type="button"
            id="$btnResultRestart"
            class="menu-btn result-btn blur-bg"
          >
            <span class="result-btn-key">E</span>
            <span class="result-btn-label" id="$resultRestartLabel"></span>
          </button>
          <button
            type="button"
            id="$btnResultMenu"
            class="menu-btn result-btn blur-bg"
          >
            <span class="result-btn-key">Esc</span>
            <span class="result-btn-label" id="$resultMenuLabel"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- ===== Exit confirm screen ===== -->
    <div id="$screenExitConfirm" class="screen-exit-confirm blur-bg" hidden>
      <p class="exit-confirm-msg" id="$exitConfirmMsg"></p>
      <div class="exit-confirm-actions">
        <button
          type="button"
          id="$btnExitConfirm"
          class="menu-btn result-btn blur-bg"
        >
          <span class="result-btn-key">E</span>
          <span class="result-btn-label" id="$exitConfirmLabel"></span>
        </button>
        <button
          type="button"
          id="$btnExitResume"
          class="menu-btn result-btn blur-bg"
        >
          <span class="result-btn-key">Esc</span>
          <span class="result-btn-label" id="$exitResumeLabel"></span>
        </button>
      </div>
    </div>

    <!-- ===== Menu overlay ===== -->
    <div id="$menuOverlay" class="menu-overlay" hidden>
      <div id="$menuBg" class="menu-overlay-bg"></div>
      <img
        id="$menuBgMan"
        class="menu-overlay-bg-man"
        src=""
        alt=""
        aria-hidden="true"
      />
      <div class="menu-overlay-dim" hidden></div>
      <div class="menu-overlay-panel">
        <div class="menu-title">
          <img
            class="menu-title-logo"
            src="sprites/title-logo.png"
            alt="TWILIGHTHOUSE"
            aria-hidden="false"
          />

          <svg class="menu-title-logo-svg-text" viewBox="0 0 420 252" hidden>
            <defs>
              <path id="arc" d="M 0 222 Q 210 200 420 222" />
            </defs>
            <text>
              <textPath
                href="#arc"
                startOffset="20%"
                dominant-baseline="middle"
              >
                Deliver at Any Cost
                <!-- доставь любой ценой -->
              </textPath>
            </text>
          </svg>
        </div>

        <div id="$menuMain" class="menu-main">
          <button
            type="button"
            id="$menuBtnStart"
            class="menu-btn menu-main-btn blur-bg"
            data-action="start"
          >
            <img
              class="menu-main-btn-icon"
              src="sprites/icons/lighthouse.png"
              alt=""
              aria-hidden="true"
            /><span class="menu-main-btn-label" data-i18n="menu.newGame"></span>
          </button>
          <button
            type="button"
            id="$menuBtnLeaderboard"
            class="menu-btn menu-main-btn blur-bg"
            data-action="leaderboard"
          >
            <img
              class="menu-main-btn-icon"
              src="sprites/icons/compass.png"
              alt=""
              aria-hidden="true"
            /><span
              class="menu-main-btn-label"
              data-i18n="menu.leaderboard"
            ></span>
          </button>
          <button
            type="button"
            id="$menuBtnSettings"
            class="menu-btn menu-main-btn blur-bg"
            data-action="settings"
          >
            <img
              class="menu-main-btn-icon"
              src="sprites/icons/wheel.png"
              alt=""
              aria-hidden="true"
            /><span
              class="menu-main-btn-label"
              data-i18n="menu.settings"
            ></span>
          </button>
          <button
            type="button"
            id="$menuBtnAuthors"
            class="menu-btn menu-main-btn blur-bg"
            data-action="authors"
          >
            <img
              class="menu-main-btn-icon"
              src="sprites/icons/chest.png"
              alt=""
              aria-hidden="true"
            /><span class="menu-main-btn-label" data-i18n="menu.authors"></span>
          </button>
          <button
            type="button"
            id="$menuBtnTutorial"
            class="menu-btn menu-main-btn blur-bg"
            data-action="tutorial"
          >
            <img
              class="menu-main-btn-icon"
              src="sprites/icons/map.png"
              alt=""
              aria-hidden="true"
            /><span
              class="menu-main-btn-label"
              data-i18n="menu.tutorial"
            ></span>
          </button>
        </div>
        <section id="$menuSub" class="menu-sub" hidden></section>
        <template id="$menuLeaderboardHeaderTemplate">
          <div class="menu-leaderboard-header">
            <span class="menu-leaderboard-rank" data-col="rank"></span>
            <span class="menu-leaderboard-name" data-col="name"></span>
            <span class="menu-leaderboard-time" data-col="time"></span>
            <span class="menu-leaderboard-date" data-col="date"></span>
          </div>
        </template>
      </div>
      <p id="$menuHint" class="menu-hint"></p>
    </div>

    <section id="$menuTutorial" class="menu-tutorial fullscreen" hidden>
      <div class="menu-screen-shell">
        <h2 class="menu-screen-title"></h2>
        <div class="menu-card menu-howtoplay blur-bg">
          <!-- Items will be populated here -->
        </div>
      </div>
      <p class="menu-sub-hint"></p>
    </section>
    <section id="$menuSettings" class="menu-settings fullscreen" hidden>
      <div class="menu-screen-shell">
        <h2
          id="$menuSettingsTitle"
          class="menu-screen-title"
          data-i18n="settings.title"
        ></h2>
        <div id="$menuSettingsCard" class="menu-card menu-settings blur-bg">
          <!-- Language row -->
          <div class="menu-setting-row">
            <span
              id="$menuSettingsLangLabel"
              class="menu-setting-label"
              data-i18n="settings.language"
            ></span>
            <button
              id="$menuSettingsLangBtn"
              type="button"
              class="menu-setting-toggle"
            ></button>
          </div>
          <!-- Music row -->
          <div class="menu-setting-row menu-setting-row--slider">
            <span
              id="$menuSettingsMusicLabel"
              class="menu-setting-label"
              data-i18n="settings.music"
            ></span>
            <div class="menu-slider">
              <input
                id="$menuSettingsMusicInput"
                type="range"
                min="0"
                max="100"
                step="1"
              />
              <span
                id="$menuSettingsMusicValue"
                class="menu-slider-value"
              ></span>
              <button
                id="$menuSettingsMusicMute"
                type="button"
                class="menu-setting-toggle menu-slider-toggle"
              ></button>
            </div>
          </div>
          <!-- SFX row -->
          <div class="menu-setting-row menu-setting-row--slider">
            <span
              id="$menuSettingsSfxLabel"
              class="menu-setting-label"
              data-i18n="settings.sfx"
            ></span>
            <div class="menu-slider">
              <input
                id="$menuSettingsSfxInput"
                type="range"
                min="0"
                max="100"
                step="1"
              />
              <span id="$menuSettingsSfxValue" class="menu-slider-value"></span>
              <button
                id="$menuSettingsSfxMute"
                type="button"
                class="menu-setting-toggle menu-slider-toggle"
              ></button>
            </div>
          </div>
          <!-- Display Name row -->
          <div class="menu-setting-row menu-setting-row--name">
            <span
              id="$menuSettingsNameLabel"
              class="menu-setting-label"
              data-i18n="settings.displayName"
            ></span>
            <span
              id="$menuSettingsNameNote"
              class="menu-setting-note"
              hidden
            ></span>
            <form id="$menuDisplayNameForm" class="menu-setting-name-group">
              <div class="flex-row" style="gap: 10px">
                <input
                  id="$menuDisplayNameInput"
                  type="text"
                  name="displayName"
                  class="menu-setting-name-input"
                  maxlength="30"
                  autocomplete="nickname"
                  data-i18n-placeholder="settings.displayNamePlaceholder"
                />
                <div class="menu-setting-name-actions">
                  <button
                    id="$menuDisplayNameSave"
                    type="submit"
                    class="menu-setting-name-save"
                    data-i18n="settings.displayNameSave"
                  ></button>
                  <span
                    id="$menuDisplayNameStatus"
                    class="menu-setting-name-status"
                  ></span>
                </div>
              </div>

              <p id="$menuDisplayNameHint" class="menu-setting-name-hint"></p>
            </form>
          </div>
        </div>
      </div>
      <p id="$menuSettingsHint" class="menu-sub-hint" data-i18n="hint.back"></p>
    </section>
    <section
      id="$menuLeaderboard"
      class="menu-leaderboard blur fullscreen"
      hidden
    >
      <div class="menu-screen-shell">
        <h2 class="menu-screen-title"></h2>
        <p class="menu-screen-subtitle"></p>
        <div class="menu-card blur-bg">
          <p class="menu-state-label"></p>
          <div class="menu-leaderboard-list"></div>
        </div>
      </div>
      <p class="menu-sub-hint"></p>
    </section>
    <section id="$menuAuthors" class="menu-authors" hidden>
      <div class="menu-authors-bg"></div>
      <div class="menu-authors-dim"></div>
      <div class="menu-authors-scroll">
        <pre class="menu-authors-text"></pre>
      </div>
      <p class="menu-sub-hint"></p>
    </section>

    <!-- ===== Back button (shown on menu sub-screens) ===== -->
    <button type="button" id="$backBtn" class="menu-btn back-btn blur-bg">
      <span class="back-btn-arrow">←</span
      ><span
        id="$backBtnLabel"
        class="back-btn-label"
        data-i18n="btn.back"
      ></span>

      <div class="hotkey">Q</div>
    </button>

    <!-- ===== Auth modal ===== -->
    <div id="$authModal" class="auth-modal-backdrop blur-bg">
      <div class="auth-modal">
        <button class="auth-close" title="">×</button>
        <h2 class="auth-title"></h2>
        <div class="auth-tabs">
          <button class="auth-tab is-active" data-mode="signin"></button>
          <button class="auth-tab" data-mode="signup"></button>
        </div>
        <form class="auth-form">
          <label class="auth-field auth-field--name">
            <span></span>
            <input
              name="name"
              type="text"
              autocomplete="nickname"
              maxlength="24"
            />
          </label>
          <label class="auth-field">
            <span></span>
            <input name="email" type="email" required autocomplete="email" />
          </label>
          <label class="auth-field">
            <span></span>
            <input
              name="password"
              type="password"
              required
              minlength="6"
              autocomplete="current-password"
            />
          </label>
          <div class="auth-error" role="alert"></div>
          <button type="submit" class="auth-submit"></button>
        </form>
      </div>
    </div>

    <!-- ===== Discord link (bottom-right, shown on menu) ===== -->
    <a
      id="$discordLink"
      class="discord-link blur-bg"
      href="https://discord.gg/dZerNr27B"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Join our Discord"
    >
      <span class="discord-link-icon" aria-hidden="true">💬</span>
      <span class="discord-link-label">Discord</span>
    </a>

    <!-- ===== Auth widget (top-right) ===== -->
    <div id="$authWidget" class="auth-widget">
      <button
        class="menu-btn auth-widget-btn auth-widget-btn--signin blur-bg"
      ></button>
      <div class="auth-widget-user blur-bg" style="display: none">
        <span class="auth-widget-name"></span>
        <button
          class="menu-btn auth-widget-btn auth-widget-btn--signout blur-bg"
        ></button>
      </div>
    </div>
  </body>
</html>
