<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lighthouse</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"
      defer
    ></script>
    <script type="module" src="js/app.js" defer></script>
  </head>
  <body>
    <div id="$gameContainer"></div>

    <!-- ===== In-game volume controls ===== -->
    <div id="$volControls" class="vol-controls" hidden>
      <div class="vol-row">
        <button type="button" class="vol-btn" data-target="sfx" data-dir="-1">
          ◀
        </button>
        <span class="vol-icon">🔊</span>
        <span class="vol-val" id="$volSfxVal">50%</span>
        <button type="button" class="vol-btn" data-target="sfx" data-dir="1">
          ▶
        </button>
      </div>
      <div class="vol-row">
        <button type="button" class="vol-btn" data-target="music" data-dir="-1">
          ◀
        </button>
        <span class="vol-icon">🎵</span>
        <span class="vol-val" id="$volMusicVal">50%</span>
        <button type="button" class="vol-btn" data-target="music" data-dir="1">
          ▶
        </button>
      </div>
    </div>

    <!-- ===== In-game turn buttons ===== -->
    <button
      type="button"
      id="$btnLeft"
      class="turn-btn turn-btn--left"
      hidden
      aria-label="Turn left"
    >
      <span class="turn-btn-arrow">←</span>
      <span class="turn-btn-key">A</span>
    </button>
    <button
      type="button"
      id="$btnRight"
      class="turn-btn turn-btn--right"
      hidden
      aria-label="Turn right"
    >
      <span class="turn-btn-arrow">→</span>
      <span class="turn-btn-key">D</span>
    </button>

    <!-- ===== Game over / Win screen ===== -->
    <div id="$screenGameOver" class="screen-result" hidden>
      <div class="screen-result-splash" id="$resultSplash"></div>
      <div class="screen-result-content">
        <p class="screen-result-msg" id="$resultMsg"></p>
        <div class="screen-result-actions">
          <button type="button" id="$btnResultRestart" class="result-btn">
            <span class="result-btn-key">E</span>
            <span class="result-btn-label" id="$resultRestartLabel"></span>
          </button>
          <button type="button" id="$btnResultMenu" class="result-btn">
            <span class="result-btn-key">Esc</span>
            <span class="result-btn-label" id="$resultMenuLabel"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- ===== Exit confirm screen ===== -->
    <div id="$screenExitConfirm" class="screen-exit-confirm" hidden>
      <p class="exit-confirm-msg" id="$exitConfirmMsg"></p>
      <div class="exit-confirm-actions">
        <button type="button" id="$btnExitConfirm" class="result-btn">
          <span class="result-btn-key">E</span>
          <span class="result-btn-label" id="$exitConfirmLabel"></span>
        </button>
        <button type="button" id="$btnExitResume" class="result-btn">
          <span class="result-btn-key">Esc</span>
          <span class="result-btn-label" id="$exitResumeLabel"></span>
        </button>
      </div>
    </div>

    <!-- ===== Menu overlay ===== -->
    <div id="$menuOverlay" class="menu-overlay" hidden>
      <div class="menu-overlay-bg"></div>
      <div class="menu-overlay-dim" hidden></div>
      <div class="menu-overlay-panel">
        <img
          class="menu-title-logo"
          src="sprites/title-logo.png"
          alt="TWILIGHTHOUSE"
          aria-hidden="false"
        />
        <div class="menu-main">
          <button type="button" class="menu-main-btn" data-action="start">
            <img
              class="menu-main-btn-icon"
              src="sprites/icons/lighthouse.png"
              alt=""
              aria-hidden="true"
            /><span class="menu-main-btn-label"></span>
          </button>
          <button type="button" class="menu-main-btn" data-action="leaderboard">
            <img
              class="menu-main-btn-icon"
              src="sprites/icons/compass.png"
              alt=""
              aria-hidden="true"
            /><span class="menu-main-btn-label"></span>
          </button>
          <button type="button" class="menu-main-btn" data-action="settings">
            <img
              class="menu-main-btn-icon"
              src="sprites/icons/wheel.png"
              alt=""
              aria-hidden="true"
            /><span class="menu-main-btn-label"></span>
          </button>
          <button type="button" class="menu-main-btn" data-action="authors">
            <img
              class="menu-main-btn-icon"
              src="sprites/icons/chest.png"
              alt=""
              aria-hidden="true"
            /><span class="menu-main-btn-label"></span>
          </button>
          <button type="button" class="menu-main-btn" data-action="tutorial">
            <img
              class="menu-main-btn-icon"
              src="sprites/icons/map.png"
              alt=""
              aria-hidden="true"
            /><span class="menu-main-btn-label"></span>
          </button>
        </div>
        <section class="menu-sub" hidden></section>
        <p class="menu-hint"></p>
      </div>
    </div>

    <!-- ===== Back button (shown on menu sub-screens) ===== -->
    <button type="button" id="$backBtn" class="back-btn">
      <span class="back-btn-arrow">←</span><span class="back-btn-label"></span>
    </button>

    <!-- ===== Auth modal ===== -->
    <div id="$authModal" class="auth-modal-backdrop">
      <div class="auth-modal">
        <button class="auth-close" title="">×</button>
        <h2 class="auth-title"></h2>
        <div class="auth-tabs">
          <button class="auth-tab is-active" data-mode="signin"></button>
          <button class="auth-tab" data-mode="signup"></button>
        </div>
        <form class="auth-form">
          <label class="auth-field auth-field--name">
            <span></span>
            <input
              name="name"
              type="text"
              autocomplete="nickname"
              maxlength="24"
            />
          </label>
          <label class="auth-field">
            <span></span>
            <input name="email" type="email" required autocomplete="email" />
          </label>
          <label class="auth-field">
            <span></span>
            <input
              name="password"
              type="password"
              required
              minlength="6"
              autocomplete="current-password"
            />
          </label>
          <div class="auth-error" role="alert"></div>
          <button type="submit" class="auth-submit"></button>
        </form>
      </div>
    </div>

    <!-- ===== Auth widget (top-right) ===== -->
    <div id="$authWidget" class="auth-widget">
      <button class="auth-widget-btn auth-widget-btn--signin"></button>
      <div class="auth-widget-user" style="display: none">
        <span class="auth-widget-name"></span>
        <button class="auth-widget-btn auth-widget-btn--signout"></button>
      </div>
    </div>
  </body>
</html>
